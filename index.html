<!doctype html>
<html lang="fa" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script>
      // Gracefully capture and suppress benign WebSocket connection rejections from HMR
      window.addEventListener('unhandledrejection', function(event) {
        if (event.reason && (
          event.reason.message === 'WebSocket closed without opened.' ||
          (typeof event.reason === 'string' && event.reason.includes('WebSocket')) ||
          (event.reason.message && event.reason.message.includes('WebSocket'))
        )) {
          event.preventDefault();
        }
      });
      // Also suppress browser WebSocket error logs since HMR is closed in sandboxed preview
      window.addEventListener('error', function(event) {
        if (event.message && (
          event.message.includes('WebSocket') ||
          event.message.includes('vite')
        )) {
          event.preventDefault();
        }
      }, true);
    </script>
    <title>سرچ کنسول آنالیز | داشبورد پیشرفته تحلیل سئو</title>
    <!-- Vazirmatn Google Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  </head>
  <body class="bg-[#0A0F1E] text-[#F1F5F9] font-sans antialiased min-h-screen">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
